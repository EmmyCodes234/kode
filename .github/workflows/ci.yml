name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build
        run: go build -o kode${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/kode
        env:
          CGO_ENABLED: 0

      - name: Vet
        run: go vet ./...
        env:
          CGO_ENABLED: 0

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: 0

  typecheck-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: vendored/opencode
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: vendored/opencode
        run: bun run typecheck 2>/dev/null || bunx tsc --noEmit
